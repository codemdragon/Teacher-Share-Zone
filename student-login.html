<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Share Zone - Student Login</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-container glass-card">
      <div class="logo-icon" style="margin: 0 auto 16px; width: 48px; height: 48px; background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple)); font-size: 1.5rem;">S</div>
      <h1 class="auth-logo">Student Portal</h1>
      <p class="auth-subtitle">Enter your name and login code to view your assignments</p>

      <form id="student-login-form" onsubmit="handleStudentLogin(event)">
        <div class="form-group">
          <label class="form-label" for="student-name">Your Full Name</label>
          <input class="form-input" type="text" id="student-name" required placeholder="e.g. John Doe">
        </div>
        <div class="form-group">
          <label class="form-label" for="student-password">5-Digit Password Code</label>
          <input class="form-input" type="password" id="student-password" required maxlength="5" pattern="\d{5}" placeholder="12345" inputmode="numeric">
        </div>
        <button class="btn btn-primary btn-block" type="submit" id="submit-btn" style="background: var(--accent-blue);">
          <span>Access Assignments</span>
          <div class="spinner" id="btn-spinner" style="display: none; width: 18px; height: 18px; border-width: 2px; border-top-color: var(--accent-blue);"></div>
        </button>
      </form>

      <div class="auth-switch">
        <span>Are you a Teacher?</span>
        <a href="index.html" style="color: var(--accent-teal);">Go to Teacher Portal</a>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <!-- Scripts -->
  <script src="js/supabase-client.js"></script>
  <script>
    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.innerHTML = `<span>${message}</span>`;
      container.appendChild(toast);
      setTimeout(() => toast.classList.add('active'), 10);
      setTimeout(() => {
        toast.classList.remove('active');
        setTimeout(() => toast.remove(), 300);
      }, 3500);
    }

    async function handleStudentLogin(e) {
      if (e) e.preventDefault();
      const name = document.getElementById('student-name').value.trim();
      const password = document.getElementById('student-password').value.trim();
      const submitBtn = document.getElementById('submit-btn');
      const spinner = document.getElementById('btn-spinner');

      submitBtn.disabled = true;
      spinner.style.display = 'block';

      try {
        // Find student in DB by name and password
        // The RLS policy allows public read of students for verification
        const nameEncoded = encodeURIComponent(name);
        const students = await db.request(`/rest/v1/students?name=ilike.${nameEncoded}&password=eq.${password}`);
        const student = students[0];

        if (!student) {
          throw new Error("Invalid student name or password code. Please check spelling.");
        }

        // Store credentials in localStorage for session handling
        localStorage.setItem('student.session', JSON.stringify({
          id: student.id,
          name: student.name,
          class_id: student.class_id
        }));

        showToast("Access granted! Opening student viewer...", "success");
        setTimeout(() => {
          window.location.href = 'student-view.html';
        }, 1000);
      } catch (err) {
        showToast(err.message || "Student login failed", "error");
        submitBtn.disabled = false;
        spinner.style.display = 'none';
      }
    }

    // Auto-login via Direct URL params
    // Format: student-login.html?name=John%20Doe&code=12345
    window.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const name = params.get('name');
      const code = params.get('code');

      if (name && code) {
        document.getElementById('student-name').value = name;
        document.getElementById('student-password').value = code;
        handleStudentLogin();
      }
    });
  </script>
</body>
</html>
